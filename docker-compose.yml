version: '3.8'

services:
  n8n:
    container_name: n8n
    image: n8nio/n8n:latest
    restart: unless-stopped
    environment:
      - GENERIC_TIMEZONE=Europe/Berlin
      - N8N_SECURE_COOKIE=false # Auf 'true' setzen, wenn HTTPS via Cloudflare sicher erzwungen wird
      - WEBHOOK_URL=https://n8n.markb.de/
      - N8N_PUBLIC_URL=https://n8n.markb.de/
      - N8N_COMMUNITY_PACKAGES_ENABLED=true
    volumes:
      - n8n_data:/home/node/.n8n
    networks:
      - n8n-network


  nginx:
    image: nginx:latest
    container_name: nginx
    restart: unless-stopped
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - n8n-network
    depends_on:
      - n8n
    ports:
      - "81:81"

volumes:
  n8n_data:

networks:
  n8n-network:
    driver: bridge
